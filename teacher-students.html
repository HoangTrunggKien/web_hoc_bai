<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách học sinh | GeoConnect 6</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body class="dashboard-page loading">
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <div class="dashboard-brand">
                <img src="logo.png" alt="GeoConnect 6">
                <div>
                    <strong>GeoConnect 6</strong>
                    <div class="small-note">Giáo viên</div>
                </div>
            </div>
            <div class="dashboard-nav">
                <a href="teacher-dashboard.html">Quay lại cổng giáo viên</a>
                <a href="index.html">Trang chủ</a>
                <a href="index.html" id="teacherStudentsLogout">Đăng xuất</a>
            </div>
        </aside>
        <main class="dashboard-content">
            <div class="dashboard-topbar"><div><h1>Danh sách học sinh</h1><p class="dashboard-subtitle">Xem, thêm hoặc xóa học sinh khỏi lớp.</p></div></div>
            <section class="section-card">
                <div class="input-group" style="margin-bottom:14px;">
                    <label>Chọn lớp</label>
                    <select id="classSelect" style="width:100%; padding:12px 14px; border:1px solid #d6e0ec; border-radius:12px;">
                        <option value="">-- Chọn lớp --</option>
                    </select>
                </div>
                <div id="studentsList"></div>
                <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:16px;">
                    <button class="btn-primary" id="btnRefresh">Làm mới</button>
                </div>
            </section>
        </main>
    </div>
    <script>document.addEventListener('DOMContentLoaded', async function () {
        if (!await GeoConnectApp.ensureRoleAccess('teacher', 'login.html')) return;
        GeoConnectApp.bindLogout('#teacherStudentsLogout');

        const user = await GeoConnectApp.getCurrentUser();
        const classSelect = document.getElementById('classSelect');
        const studentsList = document.getElementById('studentsList');
        const btnRefresh = document.getElementById('btnRefresh');

        async function loadClasses() {
            const allClasses = await GeoConnectApp.getTeacherClasses(user.username);
            classSelect.innerHTML = '<option value="">-- Chọn lớp --</option>';
            allClasses.forEach(cls => {
                classSelect.innerHTML += '<option value="' + cls.id + '">' + cls.name + '</option>';
            });
        }

        async function loadStudents() {
            const classId = classSelect.value;
            if (!classId) {
                studentsList.innerHTML = '<p style="text-align:center; color:#666;">Chọn lớp để xem danh sách học sinh</p>';
                return;
            }
            const [students, progressList] = await Promise.all([
                GeoConnectApp.getClassStudents(classId),
                GeoConnectApp.getClassProgress(classId).catch(() => []),
            ]);
            if (!students.length) {
                studentsList.innerHTML = '<p style="text-align:center; color:#666;">Lớp này chưa có học sinh</p>';
                return;
            }
            let html = '<div class="table-wrap"><table class="data-table">';
            html += '<thead><tr><th>Học sinh</th><th>Email</th><th>Tiến độ</th></tr></thead><tbody>';
            students.forEach(student => {
                const progress = progressList.find(p => p.studentUsername === student.username);
                html += '<tr>';
                html += '<td>' + student.fullName + '</td>';
                html += '<td>' + (student.contact || '') + '</td>';
                html += '<td>';
                if (progress) {
                    html += '<div class="progress-track" style="margin-bottom:4px;"><div class="progress-fill" style="width:' + progress.completionPercent + '%"></div></div>';
                    html += '<span style="font-size:12px; color:#666;">' + progress.completionPercent + '%</span>';
                }
                html += '</td></tr>';
            });
            html += '</tbody></table></div>';
            studentsList.innerHTML = html;
        }

        await loadClasses();
        classSelect.addEventListener('change', loadStudents);
        btnRefresh.addEventListener('click', async function() {
            await loadClasses();
            await loadStudents();
        });
    });</script>
</body>
</html>
