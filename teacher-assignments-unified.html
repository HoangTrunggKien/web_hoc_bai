<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao bài tập | GeoConnect 6</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <style>
        .tabs { display: flex; gap: 16px; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab-btn { padding: 12px 0; border: none; background: none; cursor: pointer; font-weight: 500; border-bottom: 3px solid transparent; color: #666; }
        .tab-btn.active { color: #27ae60; border-bottom-color: #27ae60; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .assignment-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }
        .assignment-card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 16px; transition: all 0.3s; }
        .assignment-card:hover { box-shadow: 0 4px 12px rgba(39,174,96,0.15); }
        .btn-small { padding: 6px 12px; font-size: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
        .btn-primary { background: #27ae60; color: white; }
        .btn-primary:hover { background: #229954; }
        .btn-secondary { background: #e9ecef; color: #333; }
        .btn-secondary:hover { background: #dee2e6; }
        .submission-table { display: flex; flex-direction: column; gap: 12px; }
        .submission-row { display: flex; justify-content: space-between; align-items: center; padding: 14px; background: #f8f9fa; border-radius: 8px; border-left: 4px solid #27ae60; }
        .submission-info { flex: 1; }
        .submission-info > div:first-child { font-weight: 500; margin-bottom: 4px; }
        .submission-info > div:last-child { font-size: 12px; color: #666; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; margin: 0 8px; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; border-radius: 12px; padding: 24px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-header { font-size: 20px; font-weight: bold; margin-bottom: 16px; border-bottom: 1px solid #eee; padding-bottom: 12px; }
        .modal-body { margin-bottom: 20px; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; border-top: 1px solid #eee; padding-top: 12px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid #d6e0ec; border-radius: 8px; font-size: 14px; font-family: inherit; }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #27ae60; box-shadow: 0 0 0 2px rgba(39,174,96,0.1); }
        .btn-modal { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; font-size: 14px; }
        .btn-primary-modal { background: #27ae60; color: white; }
        .btn-primary-modal:hover { background: #229954; }
        .btn-secondary-modal { background: #e9ecef; color: #333; }
        .btn-secondary-modal:hover { background: #dee2e6; }
        .progress-bar { display: flex; margin-bottom: 8px; }
        .progress-item { flex: 1; padding: 12px; background: #f8f9fa; border-radius: 6px; text-align: center; margin-right: 8px; }
        .progress-item:last-child { margin-right: 0; }
        .progress-number { font-weight: 600; font-size: 18px; color: #27ae60; }
        .progress-label { font-size: 12px; color: #666; }
    </style>
</head>
<body class="dashboard-page loading">
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <div class="dashboard-brand"><img src="logo.png" alt="GeoConnect 6"><div><strong>GeoConnect 6</strong><div class="small-note">Giáo viên</div></div></div>
            <div class="dashboard-nav">
                <a href="teacher-dashboard.html">Quay lại cổng giáo viên</a>
                <a href="index.html">Trang chủ</a>
                <a href="index.html" id="teacherAssignmentLogout">Đăng xuất</a>
            </div>
        </aside>
        <main class="dashboard-content">
            <div class="dashboard-topbar">
                <div>
                    <h1>Giao bài tập</h1>
                    <p class="dashboard-subtitle">Giao bài tập, chấm điểm và theo dõi tiến độ học sinh.</p>
                </div>
            </div>
            <section class="section-card">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab(event, 'assignments')">📝 Bài tập</button>
                    <button class="tab-btn" onclick="switchTab(event, 'grading')">✅ Chấm điểm</button>
                    <button class="tab-btn" onclick="switchTab(event, 'tracking')">📊 Theo dõi</button>
                </div>

                <!-- Assignments Tab -->
                <div class="tab-content active" id="assignments">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 style="margin: 0;">Danh sách bài tập</h3>
                        <button class="btn-small btn-primary" onclick="goToAssignmentsPage()">➕ Tạo bài tập</button>
                    </div>
                    <div class="input-group" style="margin-bottom: 14px;">
                        <label>Chọn lớp</label>
                        <select id="classSelect" style="width: 100%; padding: 12px 14px; border: 1px solid #d6e0ec; border-radius: 12px;">
                            <option value="">-- Chọn lớp --</option>
                        </select>
                    </div>
                    <div id="assignmentsList" class="assignment-grid"></div>
                </div>

                <!-- Grading Tab -->
                <div class="tab-content" id="grading">
                    <h3 style="margin-top: 0; margin-bottom: 16px;">Chấm điểm bài tập</h3>
                    <div class="input-group" style="margin-bottom: 14px;">
                        <label>Chọn bài tập</label>
                        <select id="gradingAssignmentSelect" style="width: 100%; padding: 12px 14px; border: 1px solid #d6e0ec; border-radius: 12px;">
                            <option value="">-- Chọn bài tập --</option>
                        </select>
                    </div>
                    <div id="submissionsList"></div>
                </div>

                <!-- Tracking Tab -->
                <div class="tab-content" id="tracking">
                    <h3 style="margin-top: 0; margin-bottom: 16px;">Theo dõi tiến độ học sinh</h3>
                    <div class="input-group" style="margin-bottom: 14px;">
                        <label>Chọn lớp</label>
                        <select id="trackingClassSelect" style="width: 100%; padding: 12px 14px; border: 1px solid #d6e0ec; border-radius: 12px;">
                            <option value="">-- Chọn lớp --</option>
                        </select>
                    </div>
                    <div id="trackingList"></div>
                </div>
            </section>

            <!-- Grading Modal -->
            <div class="modal-overlay" id="gradingModal">
                <div class="modal-content">
                    <div class="modal-header" id="gradingModalHeader">✏️ Chấm bài</div>
                    <div class="modal-body" id="gradingForm"></div>
                    <div class="modal-footer">
                        <button class="btn-modal btn-secondary-modal" onclick="closeGradingModal()">Hủy</button>
                        <button class="btn-modal btn-primary-modal" onclick="saveGrade()">Lưu điểm</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        let currentSubmissionId = null;
        let _currentSubs = [];
        let _allUsers = [];

        document.addEventListener('DOMContentLoaded', async function () {
            if (!await GeoConnectApp.ensureRoleAccess('teacher', 'login.html')) return;
            GeoConnectApp.bindLogout('#teacherAssignmentLogout');

            const user = await GeoConnectApp.getCurrentUser();
            const [classes, allUsers] = await Promise.all([
                GeoConnectApp.getTeacherClasses(user.username),
                GeoConnectApp.getAllUsers(),
            ]);
            _allUsers = allUsers;

            const classSelectHtml = '<option value="">-- Chọn lớp --</option>' + classes.map(cls => `<option value="${cls.id}">${cls.name}</option>`).join('');
            document.getElementById('classSelect').innerHTML = classSelectHtml;
            document.getElementById('trackingClassSelect').innerHTML = classSelectHtml;

            document.getElementById('classSelect').addEventListener('change', loadAssignments);
            document.getElementById('trackingClassSelect').addEventListener('change', loadTracking);

            document.getElementById('gradingModal').addEventListener('click', function(e) {
                if (e.target === this) closeGradingModal();
            });
        });

        function switchTab(e, tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            e.target.classList.add('active');
            if (tabName === 'grading') loadGradingClasses();
        }

        function goToAssignmentsPage() {
            window.location.href = 'teacher-assignments.html';
        }

        async function loadAssignments() {
            const classId = document.getElementById('classSelect').value;
            const assignmentsList = document.getElementById('assignmentsList');
            if (!classId) { assignmentsList.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999;">Chọn lớp để xem danh sách bài tập</p>'; return; }
            const [assignments, students] = await Promise.all([
                GeoConnectApp.getAssignments(classId),
                GeoConnectApp.getClassStudents(classId),
            ]);
            if (!assignments.length) {
                assignmentsList.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999;">Lớp này chưa có bài tập</p>';
                return;
            }
            const cards = await Promise.all(assignments.map(async assign => {
                const submissions = await GeoConnectApp.getSubmissions(assign.id);
                const submittedCount = submissions.filter(s => s.answers || s.submissionFile).length;
                return `
                    <div class="assignment-card">
                        <h3 style="margin-bottom: 8px;">${assign.title}</h3>
                        <p class="small-note" style="margin-bottom: 12px;">${assign.description || 'Không có mô tả'}</p>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span class="small-note" style="color: #27ae60; font-weight: 500;">Đã nộp: ${submittedCount}/${students.length}</span>
                            <button class="btn-small btn-primary" onclick="goToEditAssignment('${assign.id}')">Chi tiết</button>
                        </div>
                    </div>`;
            }));
            assignmentsList.innerHTML = cards.join('');
        }

        function goToEditAssignment(assignmentId) {
            window.location.href = 'teacher-assignments.html?edit=' + assignmentId;
        }

        async function loadGradingClasses() {
            const user = await GeoConnectApp.getCurrentUser();
            const classes = await GeoConnectApp.getTeacherClasses(user.username);
            const lists = await Promise.all(classes.map(c => GeoConnectApp.getAssignments(c.id)));
            const allAssignments = [].concat(...lists);
            const select = document.getElementById('gradingAssignmentSelect');
            select.innerHTML = '<option value="">-- Chọn bài tập --</option>' + allAssignments.map(a => `<option value="${a.id}">${a.title}</option>`).join('');
            select.addEventListener('change', loadSubmissions);
        }

        async function loadSubmissions() {
            const assignmentId = document.getElementById('gradingAssignmentSelect').value;
            const submissionsList = document.getElementById('submissionsList');
            if (!assignmentId) { submissionsList.innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">Chọn bài tập để xem danh sách bài làm</p>'; return; }
            _currentSubs = await GeoConnectApp.getSubmissions(assignmentId);
            if (!_currentSubs.length) {
                submissionsList.innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">Chưa có học sinh nộp bài</p>';
                return;
            }
            let html = '<div class="submission-table">';
            _currentSubs.forEach(sub => {
                const student = _allUsers.find(u => u.username === sub.studentUsername);
                const statusBadge = sub.score != null
                    ? '<span class="badge badge-success">Đã chấm: ' + sub.score + '/10</span>'
                    : '<span class="badge badge-warning">Chưa chấm</span>';
                html += `
                    <div class="submission-row">
                        <div class="submission-info">
                            <div>${student ? student.fullName : sub.studentUsername}</div>
                            <div>Nộp: ${new Date(sub.submittedAt).toLocaleString('vi-VN')}</div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            ${statusBadge}
                            <button class="btn-small btn-primary" onclick="openGradingModal('${sub.id}')">Chấm</button>
                        </div>
                    </div>`;
            });
            html += '</div>';
            submissionsList.innerHTML = html;
        }

        function openGradingModal(submissionId) {
            const submission = _currentSubs.find(s => s.id === submissionId);
            if (!submission) return;
            const student = _allUsers.find(u => u.username === submission.studentUsername);
            currentSubmissionId = submissionId;
            let submissionFileHtml = '';
            if (submission.submissionFile && submission.submissionFile.url) {
                const sizeKB = ((submission.submissionFile.size || 0) / 1024).toFixed(2);
                submissionFileHtml = `
                    <div class="form-group">
                        <label style="color: #333; font-size: 14px;">📤 Bài làm (Tệp được tải lên)</label>
                        <div style="padding: 12px; background: #f8f9fa; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;">
                            <span>📄 ${submission.submissionFile.name} (${sizeKB} KB)</span>
                            <a class="btn-small btn-primary" href="${submission.submissionFile.url}" target="_blank" rel="noopener">📥 Tải</a>
                        </div>
                    </div>`;
            }
            document.getElementById('gradingForm').innerHTML = `
                <div class="form-group">
                    <label style="color: #333; font-size: 14px;">👨‍🎓 Học sinh</label>
                    <div style="padding: 10px 12px; background: #f8f9fa; border-radius: 8px; font-weight: 500;">${student ? student.fullName : submission.studentUsername}</div>
                </div>
                ${submissionFileHtml}
                <div class="form-group">
                    <label>📝 Điểm (0-10)</label>
                    <input type="number" id="scoreInput" min="0" max="10" step="0.5" value="${submission.score != null ? submission.score : ''}" placeholder="Nhập điểm của học sinh">
                </div>
                <div class="form-group">
                    <label>💬 Nhận xét / Phản hồi (tùy chọn)</label>
                    <textarea id="feedbackInput" placeholder="Viết nhận xét hoặc hướng dẫn cải thiện...">${submission.feedback || ''}</textarea>
                </div>`;
            document.getElementById('gradingModal').classList.add('active');
        }

        function closeGradingModal() {
            document.getElementById('gradingModal').classList.remove('active');
            currentSubmissionId = null;
        }

        async function saveGrade() {
            if (!currentSubmissionId) return;
            const score = parseFloat(document.getElementById('scoreInput').value);
            const feedback = document.getElementById('feedbackInput').value.trim();
            if (isNaN(score) || score < 0 || score > 10) { alert('Điểm phải từ 0 đến 10'); return; }
            try {
                await GeoConnectApp.gradeSubmission(currentSubmissionId, score, feedback);
                alert('Lưu điểm thành công!');
                closeGradingModal();
                await loadSubmissions();
            } catch (err) {
                alert('Lưu điểm thất bại: ' + (err.data?.message || err.message));
            }
        }

        async function loadTracking() {
            const classId = document.getElementById('trackingClassSelect').value;
            const trackingList = document.getElementById('trackingList');
            if (!classId) { trackingList.innerHTML = '<p style="text-align: center; color: #999;">Chọn lớp để theo dõi tiến độ</p>'; return; }
            const [students, assignments] = await Promise.all([
                GeoConnectApp.getClassStudents(classId),
                GeoConnectApp.getAssignments(classId),
            ]);
            if (!students.length) { trackingList.innerHTML = '<p style="text-align: center; color: #999;">Lớp chưa có học sinh</p>'; return; }
            const subsList = await Promise.all(assignments.map(a => GeoConnectApp.getSubmissions(a.id)));
            let html = '<div style="overflow-x: auto;"><table style="width: 100%; border-collapse: collapse;"><thead><tr style="background: #f0f0f0;"><th style="padding: 12px; text-align: left; border-bottom: 2px solid #eee;">Học sinh</th>';
            assignments.forEach(a => { html += '<th style="padding: 12px; text-align: center; border-bottom: 2px solid #eee; font-size: 12px;">' + a.title.substring(0, 15) + '</th>'; });
            html += '</tr></thead><tbody>';
            students.forEach(student => {
                html += '<tr><td style="padding: 12px; border-bottom: 1px solid #eee;"><strong>' + student.fullName + '</strong></td>';
                assignments.forEach((a, i) => {
                    const sub = subsList[i].find(s => s.studentUsername === student.username);
                    const status = sub && sub.score != null
                        ? '<span style="color: #27ae60; font-weight: 600;">' + sub.score + '</span>'
                        : '<span style="color: #999; font-size: 12px;">-</span>';
                    html += '<td style="padding: 12px; text-align: center; border-bottom: 1px solid #eee;">' + status + '</td>';
                });
                html += '</tr>';
            });
            html += '</tbody></table></div>';
            trackingList.innerHTML = html;
        }
    </script>
</body>
</html>
